apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: afds-kafka-pvc
  namespace: afds
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: afds
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3
---
apiVersion: v1
kind: Service
metadata:
  name: afds-kafka
  namespace: afds
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: afds
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 9092
      protocol: TCP
      name: plaintext
  selector:
    app.kubernetes.io/name: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: afds-kafka
  namespace: afds
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: afds
spec:
  serviceName: afds-kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: afds
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "0"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "0@afds-kafka-0.afds-kafka.afds.svc.cluster.local:9093"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://afds-kafka.afds.svc.cluster.local:9092"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_CFG_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_CFG_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_CFG_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_CFG_LOG_SEGMENT_BYTES
              value: "1073741824"
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - kafka-topics.sh --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - kafka-topics.sh --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: afds-kafka-pvc
---
apiVersion: batch/v1
kind: Job
metadata:
  name: afds-kafka-init
  namespace: afds
  labels:
    app.kubernetes.io/name: kafka-init
    app.kubernetes.io/part-of: afds
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: bitnami/kafka:3.7
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for Kafka to be ready..."
              until kafka-topics.sh --bootstrap-server afds-kafka:9092 --list 2>/dev/null; do
                echo "Kafka not ready, retrying in 5s..."
                sleep 5
              done
              echo "Kafka is ready."
      containers:
        - name: kafka-init
          image: bitnami/kafka:3.7
          command:
            - /bin/bash
            - -c
            - |
              echo "Creating Kafka topics..."
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic raw-transactions --partitions 3 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic scored-events --partitions 3 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic interdiction-commands --partitions 1 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic audit-log --partitions 3 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic detection-rules --partitions 1 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic rule-match-events --partitions 3 --replication-factor 1
              # ── Advanced AFDS (GNN + DL + XAI) — Phase A/B topics ──
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic afds.features.online --partitions 3 --replication-factor 1 --config cleanup.policy=compact
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic afds.model.scores --partitions 3 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic afds.model.explanations --partitions 3 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic afds.model.drift --partitions 1 --replication-factor 1
              kafka-topics.sh --bootstrap-server afds-kafka:9092 --create --if-not-exists --topic afds.feedback.labels --partitions 3 --replication-factor 1 --config cleanup.policy=compact
              echo "All topics created."

