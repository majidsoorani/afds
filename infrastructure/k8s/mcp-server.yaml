apiVersion: apps/v1
kind: Deployment
metadata:
  name: afds-mcp-server
  namespace: afds
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/part-of: afds
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server
        app.kubernetes.io/part-of: afds
    spec:
      containers:
        - name: mcp-server
          image: ghcr.io/majidsoorani/afds-mcp-server:latest
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: afds-secrets
                  key: MCP_DB_DSN
            - name: KAFKA_BOOTSTRAP
              value: "afds-kafka:9092"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: afds-mcp-server
  namespace: afds
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/part-of: afds
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mcp-server
