apiVersion: v1
kind: Service
metadata:
  name: afds-backend
  namespace: afds
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: afds
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afds-backend
  namespace: afds
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: afds
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: afds
    spec:
      containers:
        - name: backend
          image: ghcr.io/majidsoorani/afds-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: afds-config
            - secretRef:
                name: afds-secrets
          env:
            - name: BACKEND_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: afds-secrets
                  key: BACKEND_SECRET_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: afds-backend-hpa
  namespace: afds
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: afds
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: afds-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
