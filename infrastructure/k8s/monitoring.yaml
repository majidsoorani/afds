# ============================================
# AFDS Monitoring Stack — Prometheus + Grafana
# Deployed locally in the afds namespace
# ============================================

# ── Prometheus ConfigMap ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: afds-prometheus-config
  namespace: afds
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'afds-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['afds']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '${1}:8000'
        metrics_path: /metrics

      - job_name: 'flink-jobmanager'
        static_configs:
          - targets: ['afds-flink-jobmanager.afds.svc.cluster.local:8081']
        metrics_path: /metrics

      - job_name: 'kafka'
        static_configs:
          - targets: ['afds-kafka.afds.svc.cluster.local:9092']

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['afds']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: ${1}:${2}
            target_label: __address__

---
# ── Prometheus PVC ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: afds-prometheus-pvc
  namespace: afds
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3

---
# ── Prometheus Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afds-prometheus
  namespace: afds
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: afds
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: afds
    spec:
      serviceAccountName: afds-prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
            - '--web.enable-lifecycle'
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
      volumes:
        - name: config
          configMap:
            name: afds-prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: afds-prometheus-pvc

---
# ── Prometheus Service ──
apiVersion: v1
kind: Service
metadata:
  name: afds-prometheus
  namespace: afds
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app.kubernetes.io/name: prometheus

---
# ── Prometheus ServiceAccount + RBAC ──
apiVersion: v1
kind: ServiceAccount
metadata:
  name: afds-prometheus
  namespace: afds

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: afds-prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "endpoints", "services"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: afds-prometheus
subjects:
  - kind: ServiceAccount
    name: afds-prometheus
    namespace: afds
roleRef:
  kind: ClusterRole
  name: afds-prometheus
  apiGroup: rbac.authorization.k8s.io

---
# ── Grafana ConfigMap (datasources + dashboard provisioning) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: afds-grafana-config
  namespace: afds
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://afds-prometheus.afds.svc.cluster.local:9090
        isDefault: true
        editable: false

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'afds'
        orgId: 1
        folder: 'AFDS'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true

---
# ── Grafana PVC ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: afds-grafana-pvc
  namespace: afds
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp3

---
# ── Grafana Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: afds-grafana
  namespace: afds
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: afds
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: afds
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: afds-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SERVER_ROOT_URL
              value: "https://afds.example.com/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: config-datasources
              mountPath: /etc/grafana/provisioning/datasources
              subPath: datasources.yaml
            - name: config-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
              subPath: dashboards.yaml
            - name: dashboard-files
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
      volumes:
        - name: config-datasources
          configMap:
            name: afds-grafana-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: config-dashboards
          configMap:
            name: afds-grafana-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboard-files
          configMap:
            name: afds-grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: afds-grafana-pvc

---
# ── Grafana Dashboard ConfigMap ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: afds-grafana-dashboards
  namespace: afds
data:
  afds-overview.json: |
    {
      "dashboard": {
        "uid": "afds-overview",
        "title": "AFDS Overview",
        "panels": [
          {"id":1,"title":"HTTP Requests/s","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":0},"targets":[{"expr":"rate(http_requests_total{service=\"afds-backend\"}[5m])"}]},
          {"id":2,"title":"Latency p95","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":0},"targets":[{"expr":"histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service=\"afds-backend\"}[5m]))"}]},
          {"id":3,"title":"Kafka Consumer Lag","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":8},"targets":[{"expr":"kafka_consumer_group_lag{group=~\"afds.*\"}"}]},
          {"id":4,"title":"Pod CPU","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":8},"targets":[{"expr":"rate(container_cpu_usage_seconds_total{namespace=\"afds\"}[5m])"}]},
          {"id":5,"title":"Pod Memory (MiB)","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":16},"targets":[{"expr":"container_memory_working_set_bytes{namespace=\"afds\"}/1048576"}]},
          {"id":6,"title":"Risk Distribution","type":"bargauge","gridPos":{"h":8,"w":12,"x":12,"y":16},"targets":[{"expr":"afds_risk_level_total"}]}
        ]
      }
    }

---
# ── Grafana Service ──
apiVersion: v1
kind: Service
metadata:
  name: afds-grafana
  namespace: afds
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: grafana
