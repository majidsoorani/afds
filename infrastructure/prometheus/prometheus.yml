global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "afds-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: backend

  - job_name: "flink"
    metrics_path: /
    static_configs:
      - targets: ["flink-jobmanager:8081"]
        labels:
          service: flink
