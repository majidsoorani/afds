# ============================================
# AFDS Flink Configuration
# Substitution variables for Flink SQL jobs
# ============================================

# Kafka
KAFKA_BOOTSTRAP_SERVERS=kafka:9092
KAFKA_SECURITY_PROTOCOL=PLAINTEXT

# PostgreSQL
DB_HOST=postgres
DB_PORT=5432
DB_NAME=afds
DB_USER=afds_admin
DB_PASSWORD=afds_secret

# Risk Scoring Thresholds
RISK_THRESHOLD_HIGH=50
RISK_THRESHOLD_CRITICAL=75
VELOCITY_WINDOW_MINUTES=2
VELOCITY_THRESHOLD_WARNING=3
VELOCITY_THRESHOLD_CRITICAL=10
